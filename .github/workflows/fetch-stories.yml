name: Fetch Guardian Stories

on:
  schedule:
    - cron: "*/7 * * * *"
  workflow_dispatch:

concurrency:
  group: fetch-stories
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Fetch and process stories
        env:
          GUARDIAN_API_KEY: ${{ secrets.GUARDIAN_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/fetch-stories.js

      - name: Commit updated stories
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/stories.json
          git diff --cached --quiet || (git commit -m "Update stories $(date -u +%Y-%m-%dT%H:%M:%SZ)" && git push)
