<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guardian World Map</title>
  <meta name="description" content="Live world map of Guardian news stories, updated every few minutes.">

  <meta property="og:title" content="Guardian World Map">
  <meta property="og:description" content="Live world map of Guardian news stories, plotted geographically and updated in near real-time.">
  <meta property="og:type" content="website">

  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self';
      script-src 'self' https://unpkg.com;
      style-src 'self' 'unsafe-inline' https://unpkg.com;
      img-src 'self' https://*.guim.co.uk https://media.guim.co.uk https://tiles.openfreemap.org https://*.openfreemap.org data: blob:;
      connect-src 'self' https://tiles.openfreemap.org https://*.openfreemap.org;
      worker-src blob:;
      font-src 'self';">

  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css">
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>

  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Header -->
  <header id="header">
    <div class="header-left">
      <h1>Guardian World Map</h1>
      <span id="story-count" class="badge">0 stories</span>
    </div>
    <div class="header-center">
      <div id="time-filters" class="filter-bar">
        <button class="filter-btn" data-hours="3">3h</button>
        <button class="filter-btn active" data-hours="12">12h</button>
        <button class="filter-btn" data-hours="24">24h</button>
        <div class="filter-indicator"></div>
      </div>
    </div>
    <div class="header-right">
      <span id="updated-at" class="meta-text">Loading...</span>
    </div>
  </header>

  <!-- Map -->
  <div id="map"></div>

  <!-- Legend -->
  <div id="legend">
    <div class="legend-item"><span class="legend-dot" style="background: var(--conflict)"></span>Conflict</div>
    <div class="legend-item"><span class="legend-dot" style="background: var(--climate)"></span>Climate</div>
    <div class="legend-item"><span class="legend-dot" style="background: var(--politics)"></span>Politics</div>
    <div class="legend-item"><span class="legend-dot" style="background: var(--economy)"></span>Economy</div>
    <div class="legend-item"><span class="legend-dot" style="background: var(--health)"></span>Health</div>
    <div class="legend-item"><span class="legend-dot" style="background: var(--culture)"></span>Culture</div>
    <div class="legend-item"><span class="legend-dot" style="background: var(--sport)"></span>Sport</div>
    <div class="legend-item"><span class="legend-dot" style="background: var(--tech)"></span>Tech</div>
  </div>

  <!-- Detail Panel -->
  <aside id="panel" class="panel hidden">
    <button id="panel-close" class="panel-close" aria-label="Close panel">&times;</button>
    <div id="panel-content"></div>
  </aside>

  <!-- Toast notifications -->
  <div id="toast-container"></div>

  <!-- Loading overlay -->
  <div id="loading-overlay">
    <div class="loading-spinner"></div>
    <p>Loading stories...</p>
  </div>

  <!-- Staleness warning -->
  <div id="stale-warning" class="stale-warning hidden">
    Data may be stale &mdash; last updated <span id="stale-time"></span> ago
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
